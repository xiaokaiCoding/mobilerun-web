services:
  backend:
    build: ./backend
    container_name: mobilerun-backend
    restart: always
    environment:
      PORT: 4000
      DB_HOST: 172.18.0.2
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      DB_NAME: mobilerun_web
      ADB_HOST: host.docker.internal
      ADB_PORT: 5037
      ANDROID_ADB_SERVER_HOST: host.docker.internal
      ANDROID_ADB_SERVER_PORT: 5037
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - nav-station
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: mobilerun-frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: mobilerun-nginx
    restart: always
    depends_on:
      - frontend
    ports:
      - "${HTTP_PORT:-81}:80"
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf

networks:
  default:
  nav-station:
    external: true
    name: nav-station_default

configs:
  nginx_conf:
    content: |
      server {
          listen 80;
          server_name _;
          client_max_body_size 10m;

          location / {
              proxy_pass http://frontend:3000;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection upgrade;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_cache_bypass $$http_upgrade;
          }

          location /api/ {
              proxy_pass http://backend:4000;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;

              # SSE: disable buffering for real-time streaming
              proxy_set_header Connection '';
              proxy_buffering off;
              proxy_cache off;
              proxy_read_timeout 86400s;
              chunked_transfer_encoding on;
          }
      }
