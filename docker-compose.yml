# Local dev: just MySQL. Backend and frontend run locally via uvicorn/npm.
services:
  mysql:
    image: mysql:8.0
    container_name: mobilerun-mysql-dev
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mobilerun_web
    ports:
      - "3307:3306"
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
